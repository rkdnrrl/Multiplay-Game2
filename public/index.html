<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplay Game 2 — 탑다운</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay">
    <div id="login">
      <h2>Multiplay Game 2</h2>
      <p class="subtitle">탑다운 · 맵 구석 <strong>코어</strong>를 지키세요. 붉은 적이 닿으면 HP가 깎입니다.</p>
      <div id="serverCapacityRow" class="server-capacity-row" aria-live="polite">
        <div class="server-capacity-main">
          전체 접속: <span id="serverCapacityCurrent">—</span> / <span id="serverCapacityMax">100</span>명
          <span class="server-capacity-note">(입장 화면·게임 합산)</span>
        </div>
        <div id="serverCapacityBreakdown" class="server-capacity-breakdown">게임 중 — · 입장 대기 —</div>
      </div>
      <input id="nameInput" placeholder="닉네임을 입력하세요" maxlength="20" autocomplete="off">
      <label class="field-label" for="classSelect">클래스</label>
      <select id="classSelect" aria-label="클래스 선택">
        <option value="attack">공격</option>
        <option value="defense">방어</option>
      </select>
      <input id="roomInput" placeholder="방 이름 (예: lobby)" maxlength="30" autocomplete="off">
      <div id="roomListWrap">
        <div id="roomListTitle">활성 방 (최대 4명)</div>
        <div id="roomList"></div>
      </div>
      <button id="joinBtn">입장</button>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 이동</div>
    <div id="coreHud">코어: <span id="coreHpText">—</span></div>
    <div id="playerCount"></div>
  </div>

  <div id="gameOverOverlay" class="game-over-overlay hidden" aria-live="assertive">
    <div class="game-over-box">
      <h3>코어 파괴</h3>
      <p>수비 목표가 파괴되어 게임이 끝났습니다.</p>
      <p class="game-over-sub">잠시 후 코어가 복구되며 다음 라운드가 시작됩니다.</p>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
